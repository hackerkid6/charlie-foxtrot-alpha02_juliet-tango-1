<title>nov 21</title>
<style>
:root{--bg:#060c18;--surf:#0d1526;--surf2:#131e32;--bdr:rgba(30,150,255,.18);--bdr2:rgba(30,150,255,.38);--acc:#2ea6ff;--acc2:rgba(46,166,255,.7);--acc3:rgba(46,166,255,.1);--txt:#e8f4ff;--txt2:#a8c8e8;--txt3:#5a7a9a;--red:#ff5c6a;--amber:#ffb020;--green:#3dde7a;--r:12px;--rs:7px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#060c18 !important;color-scheme:dark}
html,body{height:100%;background:#060c18;color:var(--txt);font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;overflow:hidden;font-size:15px;text-transform:lowercase}
.mono{font-family:'SF Mono','Fira Code','Courier New',monospace}
#app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;background:#060c18}
#topbar{background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0;padding-top:env(safe-area-inset-top)}
#topbar .logo-row{padding:12px 14px 10px;display:flex;align-items:center;gap:10px}
.logo-text{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--acc);text-transform:lowercase;font-family:'SF Mono','Fira Code',monospace}
.logo-chips{margin-left:auto;display:flex;gap:6px}
.chip{font-size:9px;font-weight:700;letter-spacing:.6px;padding:3px 9px;border-radius:20px;border:1px solid var(--bdr2);color:var(--acc);font-family:'SF Mono','Fira Code',monospace;white-space:nowrap}
.chip.amber{color:var(--amber);border-color:rgba(255,176,32,.4)}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px;padding-bottom:calc(78px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch;background:#060c18}
#content::-webkit-scrollbar{display:none}
#bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:60;}#bottomnav{display:flex;justify-content:space-around;align-items:stretch;background:rgba(13,21,38,.92);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-top:1px solid var(--bdr);padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--txt3);font-size:8.5px;font-weight:600;letter-spacing:.5px;text-transform:lowercase;cursor:pointer;padding:3px 0;user-select:none;-webkit-user-select:none}
.bn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.bn.active{color:var(--acc)}
#morescrim{position:fixed;inset:0;z-index:58;background:rgba(3,7,14,.55);opacity:0;pointer-events:none;transition:opacity .25s}
#morescrim.open{opacity:1;pointer-events:auto}
#morenav{position:fixed;left:0;right:0;bottom:0;z-index:59;}#morenav{transform:translateY(105%);transition:transform .28s cubic-bezier(.3,.9,.3,1);background:var(--surf2);border-top:1px solid var(--bdr2);border-radius:18px 18px 0 0;padding:16px 14px calc(84px + env(safe-area-inset-bottom));box-shadow:0 -12px 40px rgba(0,0,0,.5)}
#morenav.open{transform:translateY(0)}
#morenav .mn-title{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:lowercase;color:var(--txt3);margin-bottom:10px;font-family:'SF Mono','Fira Code',monospace}
.mn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mn{display:flex;flex-direction:column;align-items:center;height:auto;padding:12px 4px;gap:6px;border:1px solid var(--bdr);border-radius:12px;background:var(--surf);font-size:8.5px;font-weight:600;letter-spacing:.4px;text-transform:lowercase;color:var(--txt2);justify-content:center;text-align:center;cursor:pointer;user-select:none;-webkit-user-select:none}
.mn.active{color:var(--acc);border-color:var(--acc2)}
.mn .dot{width:9px;height:9px;border-radius:50%}
.mn .mnp{font-size:8px;color:var(--txt3);font-family:'SF Mono','Fira Code',monospace;letter-spacing:0;text-transform:none}
.page{display:none}
.page.active{display:block}
.pg-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:lowercase;color:var(--acc);margin-bottom:2px;font-family:'SF Mono','Fira Code',monospace}
.pg-sub{font-size:8px;color:var(--txt3);margin-bottom:14px}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card-hd{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:lowercase;color:var(--acc);margin-bottom:10px}
.card-hd.red{color:var(--red)}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.mc{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 13px}
.mc .ml{font-size:9px;font-weight:600;letter-spacing:.7px;text-transform:lowercase;color:var(--txt3);margin-bottom:5px}
.mc .mv{font-size:18px;font-weight:700;font-family:'SF Mono','Fira Code',monospace;letter-spacing:-.5px}
.pos{color:var(--green)}.neg{color:var(--red)}.amber{color:var(--amber)}
.prog{height:4px;background:var(--surf2);border-radius:2px;overflow:hidden;margin-top:5px}
.progf{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.task{display:flex;align-items:flex-start;gap:10px;padding:10px 2px;border-bottom:1px solid var(--bdr);cursor:pointer;user-select:none;-webkit-user-select:none}
.task:last-child{border-bottom:none}
.ck{width:19px;height:19px;border:1.5px solid var(--bdr2);border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.task.done .ck{background:var(--green);border-color:var(--green)}
.ck svg{width:12px;height:12px;stroke:#06210f;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0}
.task.done .ck svg{opacity:1}
.task .nm{flex:1;font-size:12.5px;color:var(--txt);line-height:1.45}
.task.done .nm{color:var(--txt3);text-decoration:line-through}
.task .em{font-size:10px;color:var(--txt3);font-family:'SF Mono','Fira Code',monospace;flex-shrink:0;margin-top:2px;font-variant-numeric:tabular-nums}
.tt{font-size:8px;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:2px;font-family:'SF Mono','Fira Code',monospace}
.day{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.dayh{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;user-select:none;-webkit-user-select:none}
.dayh .dt{font-size:11px;font-weight:700;color:var(--acc);font-family:'SF Mono','Fira Code',monospace;flex-shrink:0}
.dayh.past .dt{color:var(--txt3)}
.dayh.today{background:var(--acc3)}
.dayh .meta{margin-left:auto;font-size:9px;color:var(--txt3);font-family:'SF Mono','Fira Code',monospace;flex-shrink:0}
.dayh.full .meta{color:var(--green)}
.dayb{display:none;padding:0 13px 8px}
.day.open .dayb{display:block}
.mo{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:lowercase;color:var(--txt3);margin:16px 2px 8px;display:flex;align-items:baseline;gap:10px;font-family:'SF Mono','Fira Code',monospace}
.mo::after{content:'';flex:1;height:1px;background:var(--bdr)}
.trow{padding:9px 0;border-bottom:1px solid var(--bdr);cursor:pointer;user-select:none}
.trow:last-child{border-bottom:none}
.trow .tl{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:4px}
.trow .tl .n{font-weight:600}
.trow .tl .p{font-size:10px;color:var(--txt3);font-family:'SF Mono','Fira Code',monospace}
.stat{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:12px;color:var(--txt2)}
.stat:last-child{border-bottom:none}
.stat b{font-family:'SF Mono','Fira Code',monospace;color:var(--txt);font-variant-numeric:tabular-nums}
.empty{text-align:center;padding:24px 12px;color:var(--txt3);font-size:12px}
.alert-i{padding:10px 12px;border-radius:var(--rs);font-size:11px;margin-bottom:10px;background:var(--acc3);border:1px solid var(--bdr2);color:var(--acc);line-height:1.5}
.back{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:lowercase;color:var(--txt3);cursor:pointer;margin-bottom:10px;font-family:'SF Mono','Fira Code',monospace}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav .cm{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:lowercase;color:var(--txt);font-family:'SF Mono','Fira Code',monospace}
.cal-nav button{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;color:var(--acc);width:34px;height:30px;font-size:15px;cursor:pointer;line-height:1}
.cal-nav button:disabled{color:var(--txt3);opacity:.4}
.cal-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-wd span{text-align:center;font-size:8px;font-weight:700;letter-spacing:.5px;color:var(--txt3);text-transform:lowercase;font-family:'SF Mono','Fira Code',monospace}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:.82;background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:5px 3px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;user-select:none;-webkit-user-select:none;min-width:0}
.cal-cell.blank{background:transparent;border-color:transparent;cursor:default}
.cal-cell .dn{font-size:11px;font-weight:600;color:var(--txt2);font-family:'SF Mono','Fira Code',monospace}
.cal-cell.today{border-color:var(--acc);background:var(--acc3)}
.cal-cell.today .dn{color:var(--acc)}
.cal-cell.exam{border-color:rgba(255,176,32,.6);background:rgba(255,176,32,.08)}
.cal-cell.exam .dn{color:var(--amber)}
.cal-cell .ch{font-size:7px;color:var(--txt3);font-family:'SF Mono','Fira Code',monospace}
.cal-cell .cdot{width:6px;height:6px;border-radius:50%;background:var(--bdr2)}
.cal-cell.c-done .cdot{background:var(--green)}
.cal-cell.c-part .cdot{background:var(--amber)}
.cal-cell.c-todo .cdot{background:var(--acc)}
.cal-cell.c-none .cdot{background:transparent}
.cal-key{display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap}

// one-time migration from v1 (pre per-video rebuild): translate old ids -> new ids
try{const old=JSON.parse(localStorage.getItem(OLD_KEY)||'[]');
  old.forEach(oi=>{(MIG[oi]||[]).forEach(ni=>done.add(ni));});
  if(old.length)localStorage.removeItem(OLD_KEY);}catch(e){}
function saveProgress(){try{localStorage.setItem(KEY,JSON.stringify([...done]))}catch(e){}}
let curTopic=null;
function toggle(id){done.has(id)?done.delete(id):done.add(id);saveProgress();renderAll();}
function todayStr(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function fmtDate(ds){const[y,m,d]=ds.split('-').map(Number);const dt=new Date(y,m-1,d);return WDAYS[dt.getDay()]+' '+MONTHS[m-1]+' '+d;}
function hm(min){return min>=60?(min/60).toFixed(1)+'h':min+'m';}
function tagStyle(tp){const c=TCOL[tp];return `color:${c};border:1px solid ${c}55;background:${c}14`;}
function taskRow(id){const t=TM[id];const ck=done.has(id);
  return `<div class="task${ck?' done':''}" onclick="toggle('${id}')"><span class="ck"><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5"/></svg></span><span class="tt" style="${tagStyle(t.tp)}">${t.tp}</span><span class="nm">${t.n}</span><span class="em">${t.em}m</span></div>`;}

function go(p){curTopic=null;closeDaySheet();
  ['today','plan','cal','dash','topic'].forEach(x=>document.getElementById('page-'+x).classList.toggle('active',x===p));
  document.querySelectorAll('.bn[data-pg]').forEach(b=>b.classList.toggle('active',b.dataset.pg===p));
  toggleMore(false);document.getElementById('content').scrollTo(0,0);}
function goTopic(tp){curTopic=tp;renderTopic();closeDaySheet();
  ['today','plan','cal','dash'].forEach(x=>document.getElementById('page-'+x).classList.remove('active'));
  document.getElementById('page-topic').classList.add('active');
  document.querySelectorAll('.bn[data-pg]').forEach(b=>b.classList.remove('active'));
  toggleMore(false);document.getElementById('content').scrollTo(0,0);}
function toggleMore(force){const mn=document.getElementById('morenav'),sc=document.getElementById('morescrim');
  const open=force!==undefined?force:!mn.classList.contains('open');
  if(open)closeDaySheet(false);
  mn.classList.toggle('open',open);sc.classList.toggle('open',open);
  document.querySelector('.bn[data-bn=more]').classList.toggle('active',open);}
let dsDate=null;
function openDay(ds){dsDate=ds;renderDaySheet();
  document.getElementById('morenav').classList.remove('open');
  document.querySelector('.bn[data-bn=more]').classList.remove('active');
  document.getElementById('daysheet').classList.add('open');
  document.getElementById('morescrim').classList.add('open');}
function closeDaySheet(hideScrim=true){dsDate=null;
  document.getElementById('daysheet').classList.remove('open');
  if(hideScrim&&!document.getElementById('morenav').classList.contains('open'))
    document.getElementById('morescrim').classList.remove('open');}
function dismissSheets(){toggleMore(false);closeDaySheet();}
function renderDaySheet(){if(!dsDate)return;const d=P.baseDays.find(x=>x.d===dsDate);let h='';
  if(dsDate===P.exam){h=`<div class="ds-title" style="color:var(--amber)">Sat Nov 21 — EXAM DAY 🎯</div><div class="ds-sub">Read the question first. ~18 min per item set. No blanks.</div>`;}
  else if(!d){h=`<div class="ds-title">${fmtDate(dsDate)}</div><div class="empty">Outside the plan</div>`;}
  else{const tot=d.t.reduce((a,i)=>a+TM[i].em,0),dc=d.t.filter(i=>done.has(i)).length;
    h=`<div class="ds-title">${fmtDate(dsDate)}</div><div class="ds-sub">${d.t.length?dc+'/'+d.t.length+' done · '+hm(tot):'buffer day'}</div>`;
    h+=d.t.length?d.t.map(taskRow).join(''):'<div class="empty">Catch-up / rest day</div>';}
  document.getElementById('daysheet').innerHTML=h;}
let calMo='';
function calMonths(){const s=new Set(P.baseDays.map(d=>d.d.slice(0,7)));s.add(P.exam.slice(0,7));return [...s].sort();}
function renderCal(){const mos=calMonths();if(!calMo){const tm=todayStr().slice(0,7);calMo=mos.includes(tm)?tm:mos[0];}
  const idx=mos.indexOf(calMo);const[y,m]=calMo.split('-').map(Number);
  const ts=todayStr();
  const first=new Date(y,m-1,1).getDay();
  const dim=new Date(y,m,0).getDate();
  let h=`<div class="pg-title">Calendar</div><div class="pg-sub">tap a day for its tasks</div>
    <div class="cal-nav"><button onclick="calShift(-1)" ${idx===0?'disabled':''}>‹</button><span class="cm">${MONTHS[m-1]} ${y}</span><button onclick="calShift(1)" ${idx===mos.length-1?'disabled':''}>›</button></div>
    <div class="cal-wd">${WDAYS.map(w=>'<span>'+w[0]+'</span>').join('')}</div><div class="cal-grid">`;
  for(let i=0;i<first;i++)h+='<div class="cal-cell blank"></div>';
  for(let dd=1;dd<=dim;dd++){const ds=`${y}-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const day=P.baseDays.find(x=>x.d===ds);
    let cls='c-none',sub='';
    if(ds===P.exam){cls='exam';sub='🎯';}
    else if(day){if(!day.t.length){cls='c-none';sub='·';}
      else{const dc=day.t.filter(i=>done.has(i)).length;
        cls=dc===day.t.length?'c-done':dc>0?'c-part':'c-todo';
        sub=hm(day.t.reduce((a,i)=>a+TM[i].em,0));}}
    const today=ds===ts?' today':'';
    const tap=(day||ds===P.exam)?` onclick="openDay('${ds}')"`:'';
    h+=`<div class="cal-cell ${cls}${today}${ds===P.exam?' exam':''}"${tap}><span class="dn">${dd}</span><span class="cdot"></span><span class="ch">${sub}</span></div>`;}
  h+=`</div><div class="cal-key">
    <span><i style="background:var(--acc)"></i>scheduled</span>
    <span><i style="background:var(--amber)"></i>in progress</span>
    <span><i style="background:var(--green)"></i>complete</span>
    <span><i style="background:var(--bdr2)"></i>buffer</span></div>`;
  document.getElementById('page-cal').innerHTML=h;}
function calShift(dir){const mos=calMonths();const i=mos.indexOf(calMo)+dir;
  if(i>=0&&i<mos.length){calMo=mos[i];renderCal();}}

function topicStats(tp){const ls=P.tasks.filter(t=>t.tp===tp);
  const tm=ls.reduce((a,t)=>a+t.em,0),dm=ls.filter(t=>done.has(t.i)).reduce((a,t)=>a+t.em,0);
  return {ls,tm,dm,dc:ls.filter(t=>done.has(t.i)).length,p:tm?Math.round(dm/tm*100):0};}

function renderMore(){let h='';Object.keys(TLABEL).forEach(tp=>{const s=topicStats(tp);
  h+=`<button class="mn" onclick="goTopic('${tp}')"><span class="dot" style="background:${TCOL[tp]}"></span>${TLABEL[tp]}<span class="mnp">${s.p}% · ${s.dc}/${s.ls.length}</span></button>`;});
  document.getElementById('mn-grid').innerHTML=h;}

function renderToday(){const ts=todayStr();
  const day=P.baseDays.find(d=>d.d===ts);
  const carry=[];P.baseDays.forEach(d=>{if(d.d<ts)d.t.forEach(id=>{if(!done.has(id))carry.push(id);});});
  let h='';
  if(day){const tot=day.t.reduce((a,i)=>a+TM[i].em,0),dn=day.t.filter(i=>done.has(i)).reduce((a,i)=>a+TM[i].em,0);
    const pc=tot?Math.round(dn/tot*100):0;
    h+=`<div class="pg-title">Today — ${fmtDate(ts)}</div><div class="pg-sub">${day.t.length?day.t.length+' tasks · '+hm(tot)+' scheduled':'no tasks scheduled'}</div>
      <div class="card">${day.t.length?`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px"><span class="card-hd" style="margin:0">Scheduled</span><span style="font-size:10px;color:var(--txt3);font-family:'SF Mono',monospace">${pc}%</span></div><div class="prog" style="margin-bottom:8px"><div class="progf" style="width:${pc}%;background:var(--green)"></div></div>${day.t.map(taskRow).join('')}`:'<div class="empty">Buffer day — clear carry-over or rest. You earned it.</div>'}</div>`;
  } else if(ts>=P.exam){
    h+='<div class="pg-title">Exam Day</div><div class="card"><div style="font-size:12.5px;color:var(--txt2);line-height:1.7">Read the question first, then the vignette. ~18 min per item set. No blanks. Execute. 🔒</div></div>';
  } else {
    h+=`<div class="pg-title">Today</div><div class="card"><div class="empty">Plan starts Mon Jul 13. Rest up.</div></div>`;
  }
  if(carry.length){h+=`<div class="card"><div class="card-hd red">Carry-over — ${carry.length} unfinished (${hm(carry.reduce((a,i)=>a+TM[i].em,0))})</div>${carry.map(taskRow).join('')}</div>`;}
  document.getElementById('page-today').innerHTML=h;}

function renderPlan(){const ts=todayStr();let h='<div class="pg-title">Full Plan</div><div class="pg-sub">Jul 13 → Nov 21 · tap a day to expand</div>',curMo='';
  P.baseDays.forEach(d=>{const mo=d.d.slice(0,7);
    if(mo!==curMo){curMo=mo;const[y,m]=mo.split('-');h+=`<div class="mo">${MONTHS[m-1]} ${y}</div>`;}
    const tot=d.t.reduce((a,i)=>a+TM[i].em,0),dc=d.t.filter(i=>done.has(i)).length;
    const cls=(d.d===ts?'today':d.d<ts?'past':'')+(d.t.length&&dc===d.t.length?' full':'');
    const meta=d.t.length?`${dc}/${d.t.length} · ${hm(tot)}`:'buffer';
    h+=`<div class="day${d.d===ts?' open':''}"><div class="dayh ${cls}" onclick="this.parentElement.classList.toggle('open')"><span class="dt">${fmtDate(d.d)}</span><span class="meta">${meta}</span></div><div class="dayb">${d.t.length?d.t.map(taskRow).join(''):'<div class="empty" style="padding:12px">Catch-up / rest day</div>'}</div></div>`;});
  h+=`<div class="mo">Exam</div><div class="day"><div class="dayh"><span class="dt" style="color:var(--amber)">Sat Nov 21</span><span class="meta" style="color:var(--amber)">EXAM DAY 🎯</span></div></div>`;
  document.getElementById('page-plan').innerHTML=h;}

function renderDash(){const ts=todayStr();
  const totMin=P.tasks.reduce((a,t)=>a+t.em,0);
  const doneMin=P.tasks.filter(t=>done.has(t.i)).reduce((a,t)=>a+t.em,0);
  const pct=Math.round(doneMin/totMin*100);
  const days=Math.max(0,Math.ceil((new Date(P.exam)-new Date(ts))/86400000));
  const remMin=totMin-doneMin;
  let h=`<div class="pg-title">Dashboard</div><div class="pg-sub">progress across all 223 tasks</div>
    <div class="mg">
      <div class="mc"><div class="ml">Complete</div><div class="mv pos">${pct}%</div></div>
      <div class="mc"><div class="ml">Days to exam</div><div class="mv">${days}</div></div>
      <div class="mc"><div class="ml">Work remaining</div><div class="mv amber">${hm(remMin)}</div></div>
      <div class="mc"><div class="ml">Required pace</div><div class="mv">${days?hm(Math.ceil(remMin/days)):'—'}<span style="font-size:9px;color:var(--txt3)">/day</span></div></div>
    </div>
    <div class="card"><div class="card-hd">Overall</div>
      <div class="stat"><span>Tasks done</span><b>${P.tasks.filter(t=>done.has(t.i)).length} / ${P.tasks.length}</b></div>
      <div class="stat"><span>Hours banked</span><b>${hm(doneMin)}</b></div>
      <div class="prog" style="height:8px;margin-top:10px"><div class="progf" style="width:${pct}%"></div></div>
    </div>
    <div class="card"><div class="card-hd">By Topic — tap to open</div>`;
  Object.keys(TLABEL).forEach(tp=>{const s=topicStats(tp);if(!s.ls.length)return;
    h+=`<div class="trow" onclick="goTopic('${tp}')"><div class="tl"><span class="n" style="color:${TCOL[tp]}">${TLABEL[tp]}</span><span class="p">${s.p}% · ${s.dc}/${s.ls.length}</span></div><div class="prog"><div class="progf" style="width:${s.p}%;background:${TCOL[tp]}"></div></div></div>`;});
  h+='</div>';
  document.getElementById('page-dash').innerHTML=h;}

function renderTopic(){if(!curTopic)return;const tp=curTopic,s=topicStats(tp);
  let h=`<span class="back" onclick="go('dash')">‹ Dashboard</span>
    <div class="pg-title" style="color:${TCOL[tp]}">${TLABEL[tp]}</div>
    <div class="pg-sub">${s.dc}/${s.ls.length} tasks · ${hm(s.dm)} of ${hm(s.tm)}</div>
    <div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px"><span class="card-hd" style="margin:0;color:${TCOL[tp]}">Progress</span><span style="font-size:10px;color:var(--txt3);font-family:'SF Mono',monospace">${s.p}%</span></div><div class="prog" style="height:7px;margin-bottom:10px"><div class="progf" style="width:${s.p}%;background:${TCOL[tp]}"></div></div>${s.ls.map(t=>taskRow(t.i)).join('')}</div>`;
  document.getElementById('page-topic').innerHTML=h;}

function renderAll(){renderToday();renderPlan();renderCal();renderDash();renderMore();if(curTopic)renderTopic();if(dsDate)renderDaySheet();
  const ts=todayStr();
  const days=Math.max(0,Math.ceil((new Date(P.exam)-new Date(ts))/86400000));
  document.getElementById('cd').textContent=days+'d to exam';
  const totMin=P.tasks.reduce((a,t)=>a+t.em,0);
  const doneMin=P.tasks.filter(t=>done.has(t.i)).reduce((a,t)=>a+t.em,0);
  document.getElementById('pct').textContent=Math.round(doneMin/totMin*100)+'% done';}
function exportProgress(){
  const payload=JSON.stringify({key:KEY,exported:todayStr(),done:[...done].sort((a,b)=>+a.slice(1)-+b.slice(1))});
  const btn=document.getElementById('btn-export');
  const ok=()=>{btn.childNodes[btn.childNodes.length-1].textContent='copied ✓ ('+done.size+' tasks)';setTimeout(()=>{btn.childNodes[btn.childNodes.length-1].textContent='export progress';},2500);};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(payload).then(ok).catch(()=>prompt('copy your progress:',payload));
  } else { prompt('copy your progress:',payload); }
}
function importProgress(){
  const raw=prompt('paste exported progress json:');
  if(!raw)return;
  try{
    const p=JSON.parse(raw);
    const ids=Array.isArray(p)?p:(p.done||[]);
    const isOld=p&&p.key===OLD_KEY;
    let added=0;ids.forEach(i=>{
      const targets=isOld||!TM[i]?(MIG[i]||[]):[i];
      (TM[i]&&!isOld?[i]:targets).forEach(n=>{if(TM[n]&&!done.has(n)){done.add(n);added++;}});});
    saveProgress();renderAll();
    alert('imported: '+added+' new · total done '+done.size);
  }catch(e){alert('could not parse that — paste the exact export json');}
}
renderAll();saveProgress();
// click-outside to escape drill-downs
document.getElementById('content').addEventListener('click',e=>{
  // collapse expanded plan days when tapping outside any day card
  if(document.getElementById('page-plan').classList.contains('active')){
    if(!e.target.closest('.day')){
      document.querySelectorAll('#page-plan .day.open').forEach(d=>d.classList.remove('open'));
    }
  }
  // topic drill-down: tap outside the card (or back link) returns to dashboard
  if(document.getElementById('page-topic').classList.contains('active')){
    if(!e.target.closest('.card')&&!e.target.closest('.back')){
      go('dash');
    }
  }
});
</script>
</body>
</html>
