<title>CFA L2 Planner</title>


<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--border:#2a2a2a;--border2:#333;--text:#f0f0f0;--text2:#a0a0a0;--text3:#555;--gold:#c9a84c;--gold2:#e8c76a;--blue:#4a9eff;--green:#4caf7d;--green2:#2d7a52;--red:#e05555;--amber:#e8a444;--purple:#8b72ff;--r:8px;--r2:12px}
html{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
body{min-height:100vh;padding-bottom:80px}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;flex-shrink:0}
.logo-text{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.exam-tag{font-size:11px;color:var(--text3);margin-top:2px}
.header-stats{display:flex;gap:16px}
.hstat{text-align:center}
.hstat-val{font-size:17px;font-weight:600;font-variant-numeric:tabular-nums}
.hstat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.3s}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px}
.tab{padding:10px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;font-family:inherit;font-weight:400}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.content{padding:14px 16px}
.day-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.nav-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-radius:var(--r);padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit}
.today-btn{background:var(--gold);border:none;color:#000;border-radius:var(--r);padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.day-info{flex:1}
.day-title{font-size:15px;font-weight:600}
.day-meta{font-size:11px;color:var(--text3);margin-top:2px}
.task-list{display:flex;flex-direction:column;gap:6px}
.task{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;display:flex;gap:10px;cursor:pointer}
.task.done{opacity:0.4}
.task.done .task-lb{text-decoration:line-through}
.ck{width:20px;height:20px;border-radius:5px;border:1px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.task.done .ck{background:var(--green2);border-color:var(--green)}
.task-body{flex:1;min-width:0}
.task-lb{font-size:13px;color:var(--text);line-height:1.4}
.task-ds{font-size:11px;color:var(--text3);margin-top:3px}
.task-meta{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
.tag-video{background:#1a2a3a;color:var(--blue)}
.tag-notes{background:#2a1f3a;color:var(--purple)}
.tag-canvas{background:#1a2d1a;color:var(--green)}
.tag-cases{background:#2d2a1a;color:var(--amber)}
.tag-mock{background:#2d1a1a;color:var(--red)}
.task-time{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}
.empty-day{text-align:center;padding:40px 16px;color:var(--text3);font-size:13px}
.empty-type{font-size:13px;color:var(--gold);margin-bottom:6px;font-weight:600}
.plan-day{border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;overflow:hidden}
.plan-day.today{border-left:3px solid var(--gold)}
.plan-day-hdr{background:var(--bg2);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.plan-day-date{font-size:13px;font-weight:500}
.plan-day.today .plan-day-date{color:var(--gold)}
.plan-day-meta{font-size:11px;color:var(--text3)}
.plan-day-meta.ok{color:var(--green)}
.plan-tasks{padding:6px 10px 10px;background:var(--bg);display:none;flex-direction:column;gap:3px}
.plan-tasks.open{display:flex}
.ct{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer}
.ct.done{opacity:0.4}
.cck{width:15px;height:15px;border-radius:3px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ct.done .cck{background:var(--green2);border-color:var(--green)}
.ct-label{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ct.done .ct-label{text-decoration:line-through}
.ct-time{font-size:10px;color:var(--text3);flex-shrink:0}
.ph{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:10px 0 4px;font-weight:600}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
.sc-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.sc-val{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums}
.sc-sub{font-size:11px;color:var(--text3);margin-top:3px}
.fc{border-radius:var(--r2);padding:12px 14px;margin-bottom:16px;border:1px solid}
.fc.ok{background:#1a2a1a;border-color:#2d4a2d}
.fc.warn{background:#2d1a0a;border-color:#6b3a0f}
.fc-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.fc-date{font-size:18px;font-weight:600}
.fc.ok .fc-date{color:var(--green)}
.fc.warn .fc-date{color:var(--amber)}
.fc-note{font-size:11px;color:var(--text3);margin-top:3px}
.tr{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;margin-bottom:8px}
.tr-hdr{display:flex;justify-content:space-between;margin-bottom:6px}
.tr-name{font-size:13px}
.tr-pct{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}
.tr-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.tr-fill{height:100%;border-radius:2px;transition:width 0.4s}
.mnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:6px 0 18px;z-index:200}
.mnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;font-size:10px;padding:4px}
.mnav-btn.active{color:var(--gold)}
.mi{font-size:20px;line-height:1}
.chk{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<header class="header">
  <div class="header-top">
    <div>
      <div class="logo">
        <span style="font-size:22px;line-height:1">&#10052;</span>
        <div class="logo-text">CFA Level II</div>
      </div>
      <div class="exam-tag" id="etag">Loading...</div>
    </div>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-val" id="hpct">0%</div><div class="hstat-lbl">Done</div></div>
      <div class="hstat"><div class="hstat-val" id="hhrs">0h</div><div class="hstat-lbl">Logged</div></div>
      <div class="hstat"><div class="hstat-val" id="hleft">0</div><div class="hstat-lbl">Left</div></div>
      <div class="hstat"><div class="hstat-val" id="hproj" style="font-size:11px">--</div><div class="hstat-lbl">Proj. end</div></div>
    </div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
</header>
<div class="tabs">
  <button class="tab active" id="tab-day" onclick="setView('day')">Today</button>
  <button class="tab" id="tab-full" onclick="setView('full')">Full Plan</button>
  <button class="tab" id="tab-dash" onclick="setView('dash')">Dashboard</button>
</div>
<div class="content" id="main"></div>
<nav class="mnav">

  <button class="mnav-btn" id="mn-dash" onclick="setView('dash')"><span class="mi">&#128202;</span>Dashboard</button>
</nav>

// -- constants ------------------------------------------------------
const MONTHS = ['Jan','Feb','Mar','Apr','May'];
const WDAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const TCOL   = {
  FSA:'#4a9eff','Corporate Issuers':'#8b72ff',Equity:'#4caf7d',
  'Fixed Income':'#e8a444',Derivatives:'#e05555',
  'Alternative Investments':'#c9a84c','Portfolio Management':'#5cc8c8',
  Economics:'#ff7eb3','Quantitative Methods':'#ff9d4a',
  Ethics:'#a0a0a0',Mocks:'#666'
};
const TLABEL = {video:'Video@2x+Quiz',notes:'Study Notes',canvas:'Canvas Test',cases:'IFT Cases',mock:'Mock Exam'};
const TM = Object.fromEntries(P.tasks.map(t=>[t.i,t]));

// -- state ----------------------------------------------------------
let done    = new Set();   // completed task ids
let view    = 'day';
let dayIdx  = 0;
let openDays = new Set();

// -- storage --------------------------------------------------------
function saveProgress() {
  try { localStorage.setItem('cfa_v7', JSON.stringify([...done])); } catch(e) {}
}
function loadProgress() {
  try {
    const raw = localStorage.getItem('cfa_v7');
    if (raw) done = new Set(JSON.parse(raw));
  } catch(e) {}
}

// -- helpers --------------------------------------------------------
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) {
  const dt = new Date(d + 'T12:00:00');
  return WDAYS[dt.getDay()] + ', ' + MONTHS[dt.getMonth()] + ' ' + dt.getDate();
}
function daysToExam() {
  return Math.max(0, Math.ceil((new Date(P.exam+'T08:30:00') - new Date()) / 86400000));
}
function chkSvg() {
  return '<svg class="chk" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>';
}
function tagHtml(tg) {
  return '<span class="tag tag-'+tg+'">' + (TLABEL[tg]||tg) + '</span>';
}

// -- task toggling --------------------------------------------------
function toggleTask(id) {
  if (done.has(id)) done.delete(id);
  else done.add(id);
  saveProgress();
  refreshAll();
}

// -- projected finish -----------------------------------------------
// Walk base plan days backwards; find last content day with any incomplete task
// Compute dynamic schedule: redistributes incomplete tasks from past days into future
function computeSchedule() {
  const td = today();
  const allContentIds = P.tasks.filter(t => t.ty !== 'mock').map(t => t.i);
  const incompleteIds = allContentIds.filter(id => !done.has(id));

  const sched = {};
  P.baseDays.forEach(d => { sched[d.d] = { b: d.b, tasks: [] }; });

  // Past days AND today: always show full base plan (done + undone)
  P.baseDays.filter(d => d.d <= td).forEach(d => {
    sched[d.d].tasks = d.t.filter(id => TM[id] && TM[id].ty !== 'mock');
  });

  // Future days only: redistribute incomplete tasks by budget
  const futureDays = P.baseDays.filter(d => d.d > td && d.d < P.mockStart && d.b > 0);
  // incomplete tasks not already shown on today
  const todayShown = new Set(sched[td] ? sched[td].tasks : []);
  const toPlace = incompleteIds.filter(id => !todayShown.has(id));

  if (futureDays.length > 0 && toPlace.length > 0) {
    const totalMin    = toPlace.reduce((s, id) => s + TM[id].em, 0);
    const totalBudget = futureDays.reduce((s, d) => s + d.b, 0);
    const queue = [...toPlace];
    futureDays.forEach(day => {
      const share = Math.round(totalMin * day.b / totalBudget);
      let used = 0;
      while (queue.length && used < share + 30) {
        const t = TM[queue[0]];
        if (used + t.em <= share + 30) { sched[day.d].tasks.push(queue.shift()); used += t.em; }
        else break;
      }
    });
    while (queue.length) sched[futureDays[futureDays.length-1].d].tasks.push(queue.shift());
  }

  // Mocks
  P.baseDays.filter(d => d.d >= P.mockStart && d.d < P.vacStart).forEach(d => {
    sched[d.d].tasks = d.t;
  });

  return sched;
}

function projectedFinish() {
  const remainMin = P.tasks.filter(t => t.ty !== 'mock' && !done.has(t.i))
                           .reduce((s, t) => s + t.em, 0);
  if (remainMin === 0) return today();
  const td = today();
  const futureDays = P.baseDays.filter(d => d.d >= td && d.d < P.mockStart && d.b > 0);
  if (futureDays.length === 0) return P.baseDays[P.baseDays.length-1].d;
  let left = remainMin;
  for (const day of futureDays) {
    left -= day.b;
    if (left <= 0) return day.d;
  }
  return futureDays[futureDays.length - 1].d;
}

function getStats() {
  const total   = P.tasks.length;
  const nDone   = P.tasks.filter(t => done.has(t.i)).length;
  const minDone = P.tasks.filter(t => done.has(t.i)).reduce((s,t) => s+t.em, 0);
  const minTot  = P.tasks.reduce((s,t) => s+t.em, 0);
  return { total, nDone, minDone, minTot, pct: Math.round(nDone/total*100) };
}

// -- header refresh ------------------------------------------------
function refreshAll() {
  const s   = getStats();
  const pf  = projectedFinish();
  const late = pf >= P.mockStart;

  document.getElementById('hpct').textContent  = s.pct + '%';
  document.getElementById('hhrs').textContent  = Math.round(s.minDone/60) + 'h';
  document.getElementById('hleft').textContent = s.total - s.nDone;
  document.getElementById('pfill').style.width = s.pct + '%';
  document.getElementById('etag').textContent  = daysToExam() + ' days to exam - May 23';
  const projEl = document.getElementById('hproj');
  const pfShort = pf.slice(5).replace('-', '/');
  projEl.textContent = pfShort;
  projEl.style.color = late ? 'var(--red)' : 'var(--green)';


  renderView();
}

// -- view switching -------------------------------------------------
function setView(v) {
  view = v;
  ['day','full','dash'].forEach(x => {
    document.getElementById('tab-'+x).classList.toggle('active', x===v);
    const m = document.getElementById('mn-'+x);
    if (m) m.classList.toggle('active', x===v);
  });
  renderView();
}

function renderView() {
  if (view === 'day')  renderDay();
  else if (view === 'full') renderFull();
  else renderDash();
}

// -- DAY VIEW -------------------------------------------------------
function getCarryForward(dateStr) {
  // All content tasks that were scheduled before dateStr and are still incomplete
  const prior = P.baseDays.filter(d => d.d < dateStr && d.d < P.mockStart && d.b > 0);
  const missed = [];
  prior.forEach(d => {
    d.t.forEach(id => {
      if (TM[id] && TM[id].ty !== 'mock' && !done.has(id)) missed.push(TM[id]);
    });
  });
  return missed;
}

function renderDay() {
  const td_today = today();
  const allDates = P.baseDays.map(d => d.d);
  const dateStr  = allDates[dayIdx] || td_today;
  const isToday  = dateStr === td_today;
  const isVac    = dateStr >= P.vacStart && dateStr <= P.vacEnd;

  // Always show base plan tasks for this day - done or not
  const baseDay = P.baseDays.find(d => d.d === dateStr);
  const taskIds = baseDay ? baseDay.t.filter(id => TM[id]) : [];
  const tasks   = taskIds.map(id => TM[id]);
  const doneCt   = tasks.filter(t => done.has(t.i)).length;
  const totMin   = tasks.reduce((s,t) => s+t.em, 0);
  const doneMin  = tasks.filter(t => done.has(t.i)).reduce((s,t) => s+t.em, 0);

  let h = '<div class="day-nav">';
  h += '<button class="nav-btn" id="btn-prev" onclick="navDay(-1)">&#8592;</button>';
  h += '<div class="day-info">';
  h += '<div class="day-title">' + fmtDate(dateStr);
  if (isToday) h += ' <span style="color:var(--gold);font-size:11px;font-weight:400">today</span>';
  h += '</div>';
  if (!isVac && tasks.length > 0)
    h += '<div class="day-meta">' + doneCt + '/' + tasks.length + ' tasks &middot; ' +
         Math.round(doneMin/60*10)/10 + 'h / ' + Math.round(totMin/60*10)/10 + 'h</div>';
  h += '</div>';
  if (!isToday) h += '<button class="nav-btn" id="btn-today" onclick="goToday()">Today</button>';
  h += '<button class="nav-btn" id="btn-next" onclick="navDay(1)">&#8594;</button>';
  h += '</div>';

  if (dateStr === P.exam) {
    h += '<div class="empty-day" style="text-align:center;padding:40px 20px">';
    h += '<div class="empty-type" style="font-size:22px;margin-bottom:12px">&#127891; Exam Day</div>';
    h += '<div style="font-size:15px;font-weight:600;color:var(--gold);margin-bottom:16px">CFA Level II &mdash; May 23, 2026</div>';
    h += '<div style="font-size:13px;color:var(--text2);line-height:1.6;font-style:italic">&ldquo;I am the greatest. I said that even before I knew I was.&rdquo;<br><span style="font-size:11px;color:var(--text3)">- Muhammad Ali</span></div>';
    h += '<div style="margin-top:20px;font-size:12px;color:var(--text3)">You put in the work. Trust it.</div>';
    h += '</div>';
  } else if (isVac) {
    h += '<div class="empty-day"><div class="empty-type">Vacation &#9996;&#65039;</div>No tasks scheduled. Enjoy your vacation!</div>';
  } else if (tasks.length === 0) {
    h += '<div class="empty-day"><div class="empty-type">Buffer day</div>Use this time for Q-bank drilling or rest.</div>';
  } else {
    // Carry-forward: incomplete tasks from prior days
    const cf = getCarryForward(dateStr);
    if (cf.length > 0) {
      h += '<div style="font-size:10px;color:var(--amber);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;padding:12px 16px 6px">&#9650; Carried forward (' + cf.length + ')</div>';
      h += '<div class="task-list" style="margin-bottom:8px">';
      cf.forEach(t => {
        h += '<div class="task" data-taskid="' + t.i + '" style="border-left:2px solid var(--amber)">';
        h += '<div class="ck"></div>';
        h += '<div class="task-body">';
        h += '<div class="task-lb">' + t.lb + '</div>';
        h += '<div class="task-ds">' + t.ds + '</div>';
        h += '<div class="task-meta">' + tagHtml(t.tg) + '<span class="task-time">' + t.em + ' min</span></div>';
        h += '</div></div>';
      });
      h += '</div>';
      h += '<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;padding:4px 16px 6px">Today</div>';
    }
    h += '<div id="task-list" class="task-list">';
    tasks.forEach(t => {
      const isDone = done.has(t.i);
      h += '<div class="task' + (isDone ? ' done' : '') + '" data-taskid="' + t.i + '">';
      h += '<div class="ck">' + (isDone ? chkSvg() : '') + '</div>';
      h += '<div class="task-body">';
      h += '<div class="task-lb">' + t.lb + '</div>';
      h += '<div class="task-ds">' + t.ds + '</div>';
      h += '<div class="task-meta">' + tagHtml(t.tg) + '<span class="task-time">' + t.em + ' min</span></div>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  document.getElementById('main').innerHTML = h;


}

function navDay(dir) {
  dayIdx = Math.max(0, Math.min(P.baseDays.length - 1, dayIdx + dir));
  renderDay();
}

function goToday() {
  const t = today();
  const idx = P.baseDays.findIndex(d => d.d === t);
  dayIdx = idx >= 0 ? idx : 0;
  renderDay();
}

// -- FULL PLAN VIEW -------------------------------------------------
function renderFull() {
  const td_today = today();
  let h = '';
  let lastPhase = '';

  P.baseDays.forEach(day => {
    const isExam  = day.d === P.exam;
    const isVac   = day.d >= P.vacStart && day.d <= P.vacEnd && day.d !== td_today;
    const isMock  = day.d >= P.mockStart;
    const tasks   = day.t.filter(id => TM[id]).map(id => TM[id]);
    // Skip Mar 22 (empty rest day before plan starts)
    if (day.d === '2026-03-22') return;

    let phase = day.d === P.exam ? 'Exam Day'
      : day.d >= P.mockStart && day.d < P.vacStart ? 'Mock Exams'
      : day.d < P.vacStart && day.b > 0 && day.t.length > 0 ? 'Content'
      : day.d < P.vacStart && day.d >= '2026-04-29' ? 'Buffer - Q-bank & review'
      : day.d < P.mockStart ? 'Vacation'
      : day.d <= '2026-05-20' ? 'Mock Exams'
      : 'Final Rest';

    if (phase !== lastPhase) {
      h += '<div class="ph">' + phase + '</div>';
      lastPhase = phase;
    }

    const doneCt  = tasks.filter(t => done.has(t.i)).length;
    const allDone = tasks.length > 0 && doneCt === tasks.length;
    const isOpen  = openDays.has(day.d);
    const isToday = day.d === td_today;

    h += '<div class="plan-day' + (isToday ? ' today' : '') + '">';
    h += '<div class="plan-day-hdr" data-daystr="' + day.d + '">';
    h += '<span class="plan-day-date">' + fmtDate(day.d) + (isVac ? ' - vacation' : '') + '</span>';
    if (!isVac)
      h += '<span class="plan-day-meta' + (allDone ? ' ok' : '') + '">'
        + (allDone ? '&#10003; complete' : doneCt + '/' + tasks.length) + '</span>';
    h += '</div>';

    if (isOpen && !isVac && tasks.length > 0) {
      h += '<div class="plan-tasks open">';
      tasks.forEach(t => {
        const isDone = done.has(t.i);
        h += '<div class="ct' + (isDone ? ' done' : '') + '" data-taskid="' + t.i + '">';
        h += '<div class="cck">' + (isDone ? chkSvg() : '') + '</div>';
        h += '<span class="ct-label">' + t.lb + '</span>';
        h += '<span class="ct-time">' + t.em + 'm</span>';
        h += '</div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });

  document.getElementById('main').innerHTML = h;


}

// -- DASHBOARD ------------------------------------------------------
function renderDash() {
  const s   = getStats();
  const pf  = projectedFinish();
  const late = pf >= P.mockStart;
  const topics = ['FSA','Corporate Issuers','Equity','Fixed Income','Derivatives',
    'Alternative Investments','Portfolio Management','Economics','Quantitative Methods','Ethics','Mocks'];

  let h = '<div class="stat-grid">';
  [
    {lbl:'Progress',    val:s.pct+'%',                    sub:s.nDone+' of '+s.total+' tasks', col:'var(--gold2)'},
    {lbl:'Hours logged',val:Math.round(s.minDone/60)+'h', sub:'of ~'+Math.round(s.minTot/60)+'h total', col:'var(--blue)'},
    {lbl:'Days to exam',val:daysToExam(),                 sub:'May 23, 2026', col:'var(--green)'},
    {lbl:'Tasks left',  val:s.total-s.nDone,              sub:Math.round((s.minTot-s.minDone)/60)+'h remaining', col:'var(--red)'},
  ].forEach(c => {
    h += '<div class="sc"><div class="sc-lbl">'+c.lbl+'</div>';
    h += '<div class="sc-val" style="color:'+c.col+'">'+c.val+'</div>';
    h += '<div class="sc-sub">'+c.sub+'</div></div>';
  });
  h += '</div>';

  h += '<div class="fc ' + (late ? 'warn' : 'ok') + '">';
  h += '<div class="fc-lbl">Projected content finish</div>';
  h += '<div class="fc-date">' + fmtDate(pf) + '</div>';
  h += '<div class="fc-note">' + (late ? '&#9888; Finish before May 1' : '&#10003; On track') + '</div>';
  h += '</div>';

  h += '<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;font-weight:600">Progress by topic</div>';
  topics.forEach(tp => {
    const tTasks = P.tasks.filter(t => t.tp === tp);
    const tDone  = tTasks.filter(t => done.has(t.i)).length;
    const pct    = tTasks.length ? Math.round(tDone/tTasks.length*100) : 0;
    const col    = TCOL[tp] || '#666';
    const isOpen = openDays.has('tp:'+tp);
    h += '<div class="tr">';
    h += '<div class="tr-hdr" data-tp="'+tp+'" style="cursor:pointer">';
    h += '<span class="tr-name">'+tp+'</span>';
    h += '<span class="tr-pct">'+tDone+'/'+tTasks.length+' - '+pct+'%</span>';
    h += '</div>';
    h += '<div class="tr-bar"><div class="tr-fill" style="width:'+pct+'%;background:'+col+'"></div></div>';
    if (isOpen) {
      h += '<div class="plan-tasks open" style="margin-top:6px">';
      tTasks.forEach(t => {
        const isDone = done.has(t.i);
        h += '<div class="ct'+(isDone?' done':'')+'" data-taskid="'+t.i+'">';
        h += '<div class="cck">'+(isDone?chkSvg():'')+'</div>';
        h += '<span class="ct-label">'+t.lb+'</span>';
        h += '<span class="ct-time">'+t.em+'m</span>';
        h += '</div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });

  document.getElementById('main').innerHTML = h;


}

// -- INIT -----------------------------------------------------------
// Single delegated click handler - set up once, never replaced
document.addEventListener('click', function(e) {
  // Task checkbox toggle - works in any view
  const taskEl = e.target.closest('[data-taskid]');
  if (taskEl) {
    e.stopPropagation();
    toggleTask(taskEl.dataset.taskid);
    return;
  }
  // Day header expand/collapse - only when in full plan view
  if (view === 'full') {
    const dayHdr = e.target.closest('[data-daystr]');
    if (dayHdr) {
      const d = dayHdr.dataset.daystr;
      if (openDays.has(d)) openDays.delete(d);
      else openDays.add(d);
      renderFull();
      return;
    }
  }
  // Topic header expand/collapse - only when in dash view
  if (view === 'dash') {
    const tpHdr = e.target.closest('[data-tp]');
    if (tpHdr) {
      const tp = tpHdr.dataset.tp;
      if (openDays.has('tp:'+tp)) openDays.delete('tp:'+tp);
      else openDays.add('tp:'+tp);
      renderDash();
      return;
    }
  }
});

loadProgress();
const _today = today();
const _todayIdx = P.baseDays.findIndex(d => d.d === _today);
dayIdx = _todayIdx >= 0 ? _todayIdx : 0;
refreshAll();
</script>
