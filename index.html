<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA Level II Study Planner — JT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
    --border:#2a2a2a;--border2:#333;
    --text:#f0f0f0;--text2:#a0a0a0;--text3:#666;
    --gold:#c9a84c;--gold2:#e8c76a;--gold3:#f5e0a0;
    --blue:#4a9eff;--blue2:#2979d4;
    --green:#4caf7d;--green2:#2d7a52;
    --red:#e05555;--amber:#e8a444;
    --purple:#8b72ff;
    --r:8px;--r2:12px;--r3:16px;
    --shadow:0 2px 8px rgba(0,0,0,0.4);
  }
  html{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}
  body{min-height:100vh;overflow-x:hidden}

  .app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}

  /* HEADER */
  .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
  .header-left{display:flex;align-items:center;gap:12px}
  .logo{font-size:13px;font-weight:600;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase}
  .exam-badge{background:var(--bg4);border:1px solid var(--gold);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--gold2);font-weight:500}
  .header-stats{display:flex;gap:20px;flex-wrap:wrap}
  .hstat{text-align:center}
  .hstat-val{font-size:18px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace}
  .hstat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em}

  /* PROGRESS BAR */
  .progress-bar-wrap{height:3px;background:var(--border);position:relative}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.3s ease}

  /* MAIN LAYOUT */
  .main{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 89px);overflow:hidden}

  /* SIDEBAR */
  .sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0}
  .sidebar::-webkit-scrollbar{width:4px}
  .sidebar::-webkit-scrollbar-track{background:transparent}
  .sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  .sidebar-section{padding:0 12px;margin-bottom:8px}
  .sidebar-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:8px 8px 4px;font-weight:500}
  .view-toggle{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;gap:3px;margin:0 12px 16px}
  .view-btn{flex:1;padding:6px 10px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s}
  .view-btn.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
  .topic-item{padding:8px 8px;border-radius:var(--r);cursor:pointer;transition:all 0.15s;margin:0 4px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .topic-item:hover{background:var(--bg3)}
  .topic-item.active{background:var(--bg4);border:1px solid var(--border2)}
  .topic-name{font-size:13px;color:var(--text2);flex:1}
  .topic-item.active .topic-name{color:var(--text)}
  .topic-pct{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
  .topic-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
  .topic-item.active .topic-dot{background:var(--gold)}

  /* CONTENT */
  .content{overflow-y:auto;padding:24px}
  .content::-webkit-scrollbar{width:4px}
  .content::-webkit-scrollbar-track{background:transparent}
  .content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

  /* DASHBOARD */
  .dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
  .stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
  .stat-val{font-size:26px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text)}
  .stat-sub{font-size:12px;color:var(--text2);margin-top:4px}
  .stat-card.gold .stat-val{color:var(--gold2)}
  .stat-card.blue .stat-val{color:var(--blue)}
  .stat-card.green .stat-val{color:var(--green)}
  .stat-card.red .stat-val{color:var(--red)}

  /* TOPIC PROGRESS BARS */
  .topic-progress-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
  .tprog{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
  .tprog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .tprog-name{font-size:13px;font-weight:500}
  .tprog-pct{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
  .tprog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .tprog-fill{height:100%;border-radius:2px;background:var(--gold);transition:width 0.4s ease}

  /* DAY VIEW */
  .day-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .day-nav-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:7px 14px;color:var(--text2);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all 0.15s}
  .day-nav-btn:hover{border-color:var(--border2);color:var(--text)}
  .day-title{font-size:18px;font-weight:600;flex:1}
  .day-meta{font-size:13px;color:var(--text2)}
  .today-btn{background:var(--gold);color:#000;border:none;border-radius:var(--r);padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif}

  /* TASK LIST */
  .task-list{display:flex;flex-direction:column;gap:6px}
  .task{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:all 0.15s}
  .task:hover{border-color:var(--border2)}
  .task.done{opacity:0.45}
  .task.done .task-label{text-decoration:line-through;color:var(--text3)}
  .task-check{width:20px;height:20px;border-radius:5px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s}
  .task.done .task-check{background:var(--green2);border-color:var(--green);color:#fff}
  .task-body{flex:1;min-width:0}
  .task-label{font-size:14px;color:var(--text);line-height:1.4}
  .task-desc{font-size:12px;color:var(--text3);margin-top:3px}
  .task-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
  .tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
  .tag-video{background:#1a2a3a;color:var(--blue)}
  .tag-notes{background:#2a1f3a;color:var(--purple)}
  .tag-canvas{background:#1a2d1a;color:var(--green)}
  .tag-cases{background:#2d2a1a;color:var(--amber)}
  .tag-mock{background:#2d1a1a;color:var(--red)}
  .task-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}

  /* FULL VIEW */
  .full-day{margin-bottom:16px;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
  .full-day-header{background:var(--bg2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
  .full-day-date{font-size:14px;font-weight:500}
  .full-day-meta{font-size:12px;color:var(--text2)}
  .full-day-tasks{padding:8px 12px 12px;display:flex;flex-direction:column;gap:4px;background:var(--bg)}
  .full-day-tasks.collapsed{display:none}
  .full-day.today .full-day-header{background:var(--bg3);border-left:3px solid var(--gold)}
  .full-day.today .full-day-date{color:var(--gold2)}
  .full-day.all-done .full-day-header{background:var(--bg2)}
  .full-day.all-done .full-day-meta::after{content:'  ✓ complete';color:var(--green)}

  .compact-task{padding:8px 10px;border-radius:var(--r);display:flex;align-items:center;gap:8px;cursor:pointer;transition:all 0.15s}
  .compact-task:hover{background:var(--bg2)}
  .compact-task.done{opacity:0.4}
  .compact-task.done .compact-label{text-decoration:line-through}
  .compact-check{width:16px;height:16px;border-radius:4px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .compact-task.done .compact-check{background:var(--green2);border-color:var(--green)}
  .compact-label{font-size:13px;color:var(--text);flex:1}
  .compact-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}

  /* EMPTY DAY */
  .empty-day{text-align:center;padding:48px 24px;color:var(--text3)}
  .empty-day .icon{font-size:32px;margin-bottom:12px}

  /* PHASE LABEL */
  .phase-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:12px 0 6px;font-weight:500}

  /* CHECKMARK SVG */
  .check-icon{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

  /* RESPONSIVE */
  @media(max-width:900px){
    .main{grid-template-columns:1fr}
    .sidebar{display:none}
    .dash-grid{grid-template-columns:1fr 1fr}
    .topic-progress-grid{grid-template-columns:1fr}
  }
  @media(max-width:600px){
    .dash-grid{grid-template-columns:1fr 1fr}
    .header-stats{gap:12px}
  }

  .mobile-nav{display:none}
  @media(max-width:768px){
    .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:200;padding:8px 0 20px}
    .mobile-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;font-size:10px;padding:4px}
    .mobile-nav-btn.active{color:var(--gold2)}
    .content{padding-bottom:80px!important}
    .header{padding:10px 14px}
    .hstat-val{font-size:15px!important}
    .main{grid-template-columns:1fr!important;height:auto!important;overflow:visible!important}
    .sidebar{display:none!important}
    .content{height:auto!important;overflow:visible!important}
  }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-left">
      <span class="logo">CFA L2 Planner</span>
      <span class="exam-badge" id="exam-countdown">— days to exam</span>
    </div>
    <div class="header-stats">

      <div class="hstat"><div class="hstat-val" id="hstat-done">0</div><div class="hstat-lbl">Tasks done</div></div>
      <div class="hstat"><div class="hstat-val" id="hstat-hrs">0h</div><div class="hstat-lbl">Hours logged</div></div>
      <div class="hstat"><div class="hstat-val" id="hstat-left">0</div><div class="hstat-lbl">Remaining</div></div>
    </div>
  </header>

  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="global-progress" style="width:0%"></div></div>

  <div class="main">
    <aside class="sidebar">
      <div class="view-toggle">
        <button class="view-btn active" id="btn-day" onclick="setView('day')">Day view</button>
        <button class="view-btn" id="btn-full" onclick="setView('full')">Full plan</button>
        <button class="view-btn" id="btn-dash" onclick="setView('dash')">Dashboard</button>
      </div>
      <div class="sidebar-label">Topics</div>
      <div id="sidebar-topics"></div>
    </aside>

    <main class="content" id="main-content"></main>
  </div>
</div>

const taskMap = {};
DATA.tasks.forEach(t => taskMap[t.i] = t);

const STORAGE_KEY = 'cfa_l2_progress_jt';
let completed = new Set();
let currentView = 'day';
let currentDayIdx = 0;

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) completed = new Set(JSON.parse(saved));
  } catch(e) {}
  findTodayIdx();
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...completed]));
  } catch(e) {}
}

function findTodayIdx() {
  const today = new Date().toISOString().split('T')[0];
  const idx = DATA.days.findIndex(d => d.d === today);
  currentDayIdx = idx >= 0 ? idx : 0;
}

function toggleTask(id) {
  if (completed.has(id)) completed.delete(id);
  else completed.add(id);
  saveProgress();
  updateStats();
  if (currentView === 'day') renderDayView();
  else if (currentView === 'full') renderFullView();
  else renderDashboard();
  renderSidebar();
}

function getStats() {
  const total = DATA.tasks.length;
  const done = DATA.tasks.filter(t => completed.has(t.i)).length;
  const doneMin = DATA.tasks.filter(t => completed.has(t.i)).reduce((s,t) => s+t.em, 0);
  const exam = new Date(DATA.exam + 'T08:30:00');
  const now = new Date();
  const days = Math.max(0, Math.ceil((exam - now) / 86400000));
  return { total, done, doneMin, days, pct: total ? Math.round(done/total*100) : 0 };
}

function updateStats() {
  const s = getStats();
  document.getElementById('hstat-pct').textContent = s.pct + '%';
  document.getElementById('hstat-done').textContent = s.done;
  document.getElementById('hstat-hrs').textContent = Math.round(s.doneMin/60) + 'h';
  document.getElementById('hstat-left').textContent = s.total - s.done;
  document.getElementById('global-progress').style.width = s.pct + '%';
  const exam = new Date(DATA.exam + 'T08:30:00');
  const days = Math.max(0, Math.ceil((exam - new Date()) / 86400000));
  document.getElementById('exam-countdown').textContent = days + ' days to exam';
}

function setView(v) {
  currentView = v;
  ['day','full','dash'].forEach(x => {
    document.getElementById('btn-'+x).classList.toggle('active', x===v);
  });
  if (v==='day') renderDayView();
  else if (v==='full') renderFullView();
  else renderDashboard();
}

const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtDate(d) {
  const dt = new Date(d + 'T12:00:00');
  return DAYS_SHORT[dt.getDay()] + ', ' + MONTHS[dt.getMonth()] + ' ' + dt.getDate();
}

function tagHtml(tg) {
  const labels = {video:'Video + Quiz', notes:'Study Notes', canvas:'Canvas Test', cases:'IFT Cases', mock:'Mock Exam'};
  return `<span class="tag tag-${tg}">${labels[tg]||tg}</span>`;
}

function checkSvg() {
  return `<svg class="check-icon" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>`;
}

function renderDayView() {
  const day = DATA.days[currentDayIdx];
  if (!day) return;
  const today = new Date().toISOString().split('T')[0];
  const isToday = day.d === today;
  const tasks = day.t.map(id => taskMap[id]).filter(Boolean);
  const doneTasks = tasks.filter(t => completed.has(t.i));
  const totalMin = tasks.reduce((s,t) => s+t.em, 0);
  const doneMin = doneTasks.reduce((s,t) => s+t.em, 0);

  let html = `
    <div class="day-nav">
      <button class="day-nav-btn" onclick="navDay(-1)">← Prev</button>
      <div class="day-title">${fmtDate(day.d)}${isToday ? ' <span style="font-size:12px;color:var(--gold);font-weight:400;">— today</span>' : ''}</div>
      <div class="day-meta">${doneTasks.length}/${tasks.length} tasks · ${Math.round(doneMin/60*10)/10}h / ${Math.round(totalMin/60*10)/10}h</div>
      <button class="today-btn" onclick="goToday()">Today</button>
      <button class="day-nav-btn" onclick="navDay(1)">Next →</button>
    </div>`;

  if (tasks.length === 0) {
    html += `<div class="empty-day"><div class="icon" style="font-size:28px;color:var(--text3)">—</div><p style="color:var(--text3);font-size:14px;margin-top:8px;">No tasks scheduled. Rest up or use this time to review weak areas.</p></div>`;
  } else {
    html += `<div class="task-list">`;
    tasks.forEach(t => {
      const done = completed.has(t.i);
      html += `
        <div class="task${done?' done':''}" onclick="toggleTask('${t.i}')">
          <div class="task-check">${done ? checkSvg() : ''}</div>
          <div class="task-body">
            <div class="task-label">${t.lb}</div>
            <div class="task-desc">${t.ds}</div>
            <div class="task-meta">${tagHtml(t.tg)}<span class="task-time">${t.em} min</span></div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  document.getElementById('main-content').innerHTML = html;
}

function navDay(dir) {
  currentDayIdx = Math.max(0, Math.min(DATA.days.length-1, currentDayIdx + dir));
  renderDayView();
}

function goToday() {
  findTodayIdx();
  renderDayView();
}

function renderFullView() {
  const today = new Date().toISOString().split('T')[0];
  let html = '';
  let lastPhase = '';

  DATA.days.forEach((day, idx) => {
    const tasks = day.t.map(id => taskMap[id]).filter(Boolean);
    if (tasks.length === 0 && day.d > '2026-05-14') return;
    const doneTasks = tasks.filter(t => completed.has(t.i));
    const isToday = day.d === today;
    const allDone = tasks.length > 0 && doneTasks.length === tasks.length;
    const totalMin = tasks.reduce((s,t) => s+t.em, 0);

    // Phase labels
    let phase = '';
    if (day.d <= '2026-05-08') phase = 'Content';
    else if (day.d <= '2026-05-14') phase = 'Mock Exams';
    else phase = 'Final Review';
    if (phase !== lastPhase) {
      html += `<div class="phase-label">${phase}</div>`;
      lastPhase = phase;
    }

    html += `
      <div class="full-day${isToday?' today':''}${allDone?' all-done':''}">
        <div class="full-day-header" onclick="toggleFullDay(this)">
          <span class="full-day-date">${fmtDate(day.d)}</span>
          <span class="full-day-meta">${doneTasks.length}/${tasks.length} · ${Math.round(totalMin/60*10)/10}h</span>
        </div>
        <div class="full-day-tasks${isToday?'':' collapsed'}">`;
    tasks.forEach(t => {
      const done = completed.has(t.i);
      html += `
          <div class="compact-task${done?' done':''}" onclick="toggleTask('${t.i}')">
            <div class="compact-check">${done ? checkSvg() : ''}</div>
            <span class="compact-label">${t.lb}</span>
            <span class="compact-time">${t.em}m</span>
          </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('main-content').innerHTML = html;
}

function toggleFullDay(header) {
  const tasks = header.nextElementSibling;
  tasks.classList.toggle('collapsed');
}

function renderDashboard() {
  const s = getStats();
  const topics = ['FSA','Corporate Issuers','Equity','Fixed Income','Derivatives','Alternative Investments','Portfolio Management','Economics','Quantitative Methods','Ethics','Mocks'];
  
  let topicData = topics.map(tp => {
    const tTasks = DATA.tasks.filter(t => t.tp === tp);
    const tDone = tTasks.filter(t => completed.has(t.i)).length;
    const pct = tTasks.length ? Math.round(tDone/tTasks.length*100) : 0;
    return {tp, total: tTasks.length, done: tDone, pct};
  });

  const totalHrs = Math.round(DATA.tasks.reduce((s,t) => s+t.em, 0)/60);
  const doneHrs = Math.round(s.doneMin/60);

  let html = `
    <div class="dash-grid">
      <div class="stat-card gold"><div class="stat-lbl">Overall progress</div><div class="stat-val">${s.pct}%</div><div class="stat-sub">${s.done} of ${s.total} tasks</div></div>
      <div class="stat-card blue"><div class="stat-lbl">Hours studied</div><div class="stat-val">${doneHrs}h</div><div class="stat-sub">of ~${totalHrs}h total</div></div>
      <div class="stat-card green"><div class="stat-lbl">Days to exam</div><div class="stat-val">${s.days}</div><div class="stat-sub">May 23, 2026</div></div>
      <div class="stat-card red"><div class="stat-lbl">Tasks remaining</div><div class="stat-val">${s.total - s.done}</div><div class="stat-sub">${totalHrs - doneHrs}h remaining</div></div>
    </div>
    <div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;font-weight:500;">Progress by topic</div>
    <div class="topic-progress-grid">`;

  topicData.forEach(({tp, total, done, pct}) => {
    html += `
      <div class="tprog">
        <div class="tprog-header">
          <span class="tprog-name">${tp}</span>
          <span class="tprog-pct">${done}/${total} — ${pct}%</span>
        </div>
        <div class="tprog-bar"><div class="tprog-fill" style="width:${pct}%"></div></div>
      </div>`;
  });
  html += `</div>`;
  document.getElementById('main-content').innerHTML = html;
}

function renderSidebar() {
  const topics = ['FSA','Corporate Issuers','Equity','Fixed Income','Derivatives','Alternative Investments','Portfolio Management','Economics','Quantitative Methods','Ethics','Mocks'];
  let html = '';
  topics.forEach(tp => {
    const tTasks = DATA.tasks.filter(t => t.tp === tp);
    const tDone = tTasks.filter(t => completed.has(t.i)).length;
    const pct = tTasks.length ? Math.round(tDone/tTasks.length*100) : 0;
    html += `
      <div class="topic-item" onclick="filterTopic('${tp}')">
        <div class="topic-dot"></div>
        <span class="topic-name">${tp}</span>
        <span class="topic-pct">${pct}%</span>
      </div>`;
  });
  document.getElementById('sidebar-topics').innerHTML = html;
}

function filterTopic(tp) {
  const firstDay = DATA.days.find(d => d.t.some(id => taskMap[id] && taskMap[id].tp === tp));
  if (firstDay) {
    const idx = DATA.days.indexOf(firstDay);
    currentDayIdx = idx;
    setView('day');
  }
}

loadProgress();
updateStats();
renderSidebar();
renderDayView();

function updateMnav(v) {
  ['day','full','dash'].forEach(function(x) {
    var el = document.getElementById('mnav-'+x);
    if(el) el.classList.toggle('active', x===v);
  });
}
</script>

<div class="mobile-nav">
  <button class="mobile-nav-btn active" id="mnav-day" onclick="setView('day');updateMnav('day')">
    <span style="font-size:20px">&#128197;</span><span>Today</span>
  </button>
  <button class="mobile-nav-btn" id="mnav-full" onclick="setView('full');updateMnav('full')">
    <span style="font-size:20px">&#128203;</span><span>Full Plan</span>
  </button>
  <button class="mobile-nav-btn" id="mnav-dash" onclick="setView('dash');updateMnav('dash')">
    <span style="font-size:20px">&#128202;</span><span>Dashboard</span>
  </button>
</div>
